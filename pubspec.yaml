name: note_secret_search
description: Android-first private password manager and notes app with local AI search.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  collection: ^1.18.0
  meta: ^1.12.0
  path: ^1.9.0
  path_provider: ^2.1.4
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  sqflite_sqlcipher: ^3.0.1
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/model_catalog/
